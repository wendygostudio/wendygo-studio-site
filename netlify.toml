[build]
  publish = "public/"
  # No build command needed — static site

# Security and cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirect www to apex
[[redirects]]
  from = "https://www.wendygostudio.com/*"
  to = "https://wendygostudio.com/:splat"
  status = 301
  force = true

# Redirect old blog subdomain (in case anyone bookmarked it)
[[redirects]]
  from = "https://blog.wendygostudio.com/*"
  to = "https://wendygostudio.com/blog/:splat"
  status = 301
  force = true
